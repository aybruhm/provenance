name: agent_policy_template
version: "0.1"
description: >
    Provenance policy template for the Acme Corp payment processing agent.
    Enforces currency allow-list, per-action amount thresholds,
    and hard blocks on data-destructive operations.

rules:
    # ── Hard blocks ────────────────────────────────────────────────────────────
    # Data deletion/bulk modification is never permitted via agent
    - action: "data.*"
      on_match: BLOCK
      reason: "Data mutations require direct human action — agents are not authorized"

    # ── Currency allow-list (checked before amount) ────────────────────────────
    # Any currency outside the approved list triggers compliance escalation
    - action: "payments.initiate"
      conditions:
          - name: currency_check
            field: currency
            operator: in
            value: [GBP, USD, EUR]
      on_violation: ESCALATE
      violation_reason: >
          Currency not on the approved list [GBP, USD, EUR].
          Escalating to compliance team for manual review.

    # ── Amount threshold ───────────────────────────────────────────────────────
    # Payments above £500 require a named human approver
    - action: "payments.initiate"
      conditions:
          - name: amount_check
            field: amount
            operator: gt
            value: 500
      on_violation: ESCALATE
      violation_reason: >
          Payment exceeds the £500 autonomous limit.
          Human approval required before execution.

    # ── Small payments in approved currencies: allow ───────────────────────────
    - action: "payments.initiate"
      on_match: ALLOW
      reason: "Payment within approved parameters — amount ≤ £500, currency approved"

    # ── Email send: always allowed ─────────────────────────────────────────────
    - action: "email.send"
      on_match: ALLOW
      reason: "Email dispatch is unrestricted for this agent"

    # ── Default passthrough ────────────────────────────────────────────────────
    - action: "*"
      on_match: BLOCK
      reason: "No specific policy rule matched; default block"
