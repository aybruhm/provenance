services:
    api:
        image: sentinel_api:latest
        build:
            context: ../api
            dockerfile: docker/dev.Dockerfile
        container_name: sentinel_api
        ports:
            - "4587:8001"
        environment:
            - DATABASE_URL=${DATABASE_URL}
        volumes:
            - ../api:/app
        labels:
            healme: true
        restart: always
        env_file:
            - ../api/.env
        depends_on:
            db:
                condition: service_healthy
        command:
            [
                "python",
                "-m",
                "uvicorn",
                "main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8001",
                "--proxy-headers",
                "--forwarded-allow-ips=*",
                "--reload",
            ]
        healthcheck:
            test:
                [
                    "CMD",
                    "/opt/python/bin/python",
                    "-c",
                    "import urllib.request; r=urllib.request.urlopen('http://localhost:8001/api/health', timeout=5); exit(0 if r.status==200 else 1)",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    db:
        image: postgres:16-alpine
        container_name: sentinel_dev
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-abc}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-qwerty}
            - POSTGRES_DB=${POSTGRES_DB:-sentinel_db}
        env_file:
            - ../api/.env
        volumes:
            - sentinel_db_data:/var/lib/postgresql/data
            - ./scripts/initialize_db.sh:/docker-entrypoint-initdb.d/initialize_db.sh:ro
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-abc} -d ${POSTGRES_DB:-sentinel_db} -h localhost -p 5432",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    sentinel_db_data:

networks:
    default:
        name: sentinel_network
